name: Forex Scanner

on:
  # Ogni 30 minuti automaticamente
  schedule:
    - cron: '*/30 * * * 1-5'  # Lun-Ven ogni 30 min

  # Puoi anche lanciarlo a mano da GitHub
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy yfinance ta httpx

      - name: Run Scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          ACCOUNT_BALANCE: ${{ secrets.ACCOUNT_BALANCE }}
          RISK_PER_TRADE: ${{ secrets.RISK_PER_TRADE }}
          MIN_CONFLUENCE: ${{ secrets.MIN_CONFLUENCE }}
        run: |
          python scanner.py
